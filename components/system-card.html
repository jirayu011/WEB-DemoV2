<template id="system-card-template">

    <article class="system-card">

        <!-- Icon -->
        <div class="system-icon">

            {{ICON}}

        </div>


        <!-- Content -->
        <div class="system-content">

            <h3 class="system-title">

                {{NAME}}

            </h3>


            <p class="system-description">

                {{DESCRIPTION}}

            </p>

        </div>


        <!-- Action -->
        <a 
            class="system-link"
            href="{{URL}}"
            target="_blank">

            Open →
        </a>

    </article>

</template>
